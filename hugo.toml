baseURL = 'https://example.org/'
languageCode = 'en-us'
title = 'Advanced Equipment Services'
theme = 'roadster'

# Configure Pagination. See https://gohugo.io/templates/pagination/#configuration
[pagination]
  pagerSize = 10 # (int) The number of pages per pager. Default is 10

[services]
  [services.googleAnalytics]
    id = 'G-MEASUREMENT_ID'  # Enable Google Analytics by entering your tracking id
  [services.disqus]
    shortname = 'your-disqus-shortname' # Enable Disqus by entering your Disqus shortname

[permalinks]
  [permalinks.term]
    tags = '/:slug/'

[taxonomies]
  category = "categories"
  tag = "tags"
  author = "authors"

# Goldmark renders raw HTML mixed within the Markdown
[markup.goldmark.renderer]
  unsafe = true # N.B. This is unsafe unless the content is under your control.  Set to false if you don't mix HTML with markdown.

[Params]
  description = "John Doe's Personal blog about everything" # Description of your site
  opengraph = true
  twitter_cards = false
  readmore = false # Show "Read more" button in list if true
  authorbox = true
  pager = true
  post_meta = ["date", "categories"] # Order of post meta information
  mainSections = ["post", "docs", "services"]
  CustomHeadHTML = "" # Add custom HTML in the <head> 

# Authorbox data comes from author content bundles.
# See examplesite/content/authors/john-doe/_index.md and
# examplesite/content/docs/customization.md for the supported setup.

[Params.logo]
  subtitle = "Bay Area Refrigeration, HVAC, and Ice Equipment" # Logo subtitle

[Params.sidebar]
  home = "right"   # Configure layout for home page
  list = "right"   # Configure layout for list pages
  single = "right" # Configure layout for single pages
  # Enable widgets in given order
  widgets = ["recent", "categories", "taglist"]

[Params.widgets]
  recent_num = 5 # Set the number of articles in the "Recent articles" widget
  tags_counter = false # Enable counter for each tag in "Tags" widget (disabled by default)
